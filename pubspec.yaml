name: tavera
description: "AI-powered camera-first calorie tracking"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  supabase_flutter: ^2.8.4
  camera: ^0.11.0+2
  image: ^4.5.4
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  permission_handler: ^11.3.1
  mobile_scanner: ^7.0.0

  # HTTP for Open Food Facts barcode lookup
  http: ^1.2.0

  # Analytics — PostHog event tracking and user identification
  posthog_flutter: ^4.6.0

  # In-app purchases — RevenueCat cross-platform subscription management
  purchases_flutter: ^9.16.0

  # Firebase — FCM push notifications + permission (iOS APNs wrapped by FCM)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.4

  # Local notification scheduling (meal-time reminders)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Social sharing — challenge infographics, grocery list text export
  share_plus: ^10.0.0
  persistent_bottom_nav_bar: ^6.2.1
  purchases_ui_flutter: ^9.16.0
  flutter_dotenv: ^6.0.0

  # Chart visualisation — dark-themed bar/line charts for 7-day trend and
  # weekly summary. Replaces the hand-rolled AnimatedContainer bars.
  fl_chart: ^0.70.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
